# Replace "agentic-ai-system" with your unique app name (fly launch will set this)
app = "agentic-ai-system"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  port = 8000
  timeout = "10s"
  type = "http"
